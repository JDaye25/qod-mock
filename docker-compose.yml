version: "3.9"

services:
  qod-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qod-api

    ports:
      - "8010:8000"

    # Load keys from repo-root .env into the container runtime env
    env_file:
      - .env

    environment:
      QOD_DB_PATH: /app/data/qod_mock.sqlite3
      QOD_ARTIFACTS_DIR: /app/artifacts
      MAX_BODY_BYTES: "1000000"

      # Ed25519 signing (current system)
      # Expected to come from .env via env_file above:
      #   QOD_ACTIVE_SIGNING_KID
      #   QOD_SIGNING_PRIVATE_KEY_B64URL
      #   QOD_SIGNING_PUBLIC_KEY_B64URL
      #
      # We DO NOT default these to empty anymore, so config mistakes fail fast.
      QOD_ACTIVE_SIGNING_KID: ${QOD_ACTIVE_SIGNING_KID:-default}
      QOD_SIGNING_PRIVATE_KEY_B64URL: ${QOD_SIGNING_PRIVATE_KEY_B64URL:?QOD_SIGNING_PRIVATE_KEY_B64URL is required (set it in .env or CI env)}
      QOD_SIGNING_PUBLIC_KEY_B64URL: ${QOD_SIGNING_PUBLIC_KEY_B64URL:-}

      # Optional rotation list for verification (matches backend.main support)
      # Format: "kid1:<pub_b64url>;kid2:<pub_b64url>"
      QOD_PUBLIC_KEYS: ${QOD_PUBLIC_KEYS:-}

    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data

    restart: unless-stopped

    command: >
      gunicorn backend.main:app
      -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --workers 2
      --timeout 30

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; u=urllib.request.urlopen('http://localhost:8000/ready', timeout=2); sys.exit(0 if 200 <= u.status < 300 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s