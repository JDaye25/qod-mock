services:
  qod-api:
    build:
      context: .
      args:
        GIT_SHA: ${QOD_GIT_SHA:-unknown}
        IMAGE_TAG: ${QOD_IMAGE_TAG:-local}
    container_name: qod-api
    ports:
      - "8010:8000"
    env_file:
      - .env
    environment:
      - QOD_ARTIFACTS_DIR=/app/artifacts
    volumes:
      - ./artifacts:/app/artifacts
    restart: unless-stopped