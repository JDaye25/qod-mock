
name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Make runner tests and docker volume agree on where artifacts live
      QOD_ARTIFACTS_DIR: artifacts

      # Optional secrets (recommended). If missing, we generate ephemeral keys in a step below.
      QOD_SIGNING_PRIVATE_KEY_B64URL: ${{ secrets.QOD_SIGNING_PRIVATE_KEY_B64URL }}
      QOD_SIGNING_PUBLIC_KEY_B64URL: ${{ secrets.QOD_SIGNING_PUBLIC_KEY_B64URL }}
      QOD_ACTIVE_SIGNING_KID: default

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies (runner)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
          # cryptography is required for ed25519 (usually already in requirements, but this is harmless if duplicated)
          python -m pip install cryptography

      - name: Ensure Ed25519 signing keys present (generate if missing)
        shell: bash
        run: |
          python - << 'PY'
          import os, base64
          from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PrivateKey

          def b64u(b: bytes) -> str:
              return base64.urlsafe_b64encode(b).decode("ascii").rstrip("=")

          priv = os.getenv("QOD_SIGNING_PRIVATE_KEY_B64URL", "").strip()
          pub  = os.getenv("QOD_SIGNING_PUBLIC_KEY_B64URL", "").strip()

          if not priv or not pub:
              k = Ed25519PrivateKey.generate()
              priv_raw = k.private_bytes_raw()
              pub_raw  = k.public_key().public_bytes_raw()
              priv = b64u(priv_raw)
              pub  = b64u(pub_raw)
              print("Generated ephemeral CI Ed25519 keypair.")
          else:
              print("Using Ed25519 keypair from GitHub secrets.")

          # Export for subsequent steps + docker compose env interpolation
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"QOD_SIGNING_PRIVATE_KEY_B64URL={priv}\n")
              f.write(f"QOD_SIGNING_PUBLIC_KEY_B64URL={pub}\n")
              f.write("QOD_ACTIVE_SIGNING_KID=default\n")
          PY

      - name: Clean artifacts folder (avoid stale picks)
        run: |
          rm -rf artifacts
          mkdir -p artifacts

      - name: Start services
        run: |
          docker compose up -d --build
          docker compose ps

      - name: Run tests
        run: |
          python -m unittest -v tests.test_integration_compose
          python -m unittest discover -s tests -p "test*.py" -v

      - name: List artifacts
        if: always()
        run: |
          echo "Artifacts directory listing:"
          ls -la artifacts || true
          echo ""
          echo "Artifacts files (maxdepth 3):"
          find artifacts -maxdepth 3 -type f -print || true

      - name: Compose logs (on failure)
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color --tail=200

      - name: Upload test artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            artifacts/**
            *.log