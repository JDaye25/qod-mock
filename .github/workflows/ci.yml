name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      QOD_ARTIFACTS_DIR: artifacts

      # Optional secrets; if missing, CI generates ephemeral keys
      QOD_ACTIVE_SIGNING_KID: ${{ secrets.QOD_ACTIVE_SIGNING_KID }}
      QOD_SIGNING_PRIVATE_KEY_B64URL: ${{ secrets.QOD_SIGNING_PRIVATE_KEY_B64URL }}
      QOD_SIGNING_PUBLIC_KEY_B64URL: ${{ secrets.QOD_SIGNING_PUBLIC_KEY_B64URL }}
      QOD_PUBLIC_KEYS: ${{ secrets.QOD_PUBLIC_KEYS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install cryptography
          python -m pip install -e .

      - name: Generate .env for docker compose (CI)
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
import os, base64

def write_env(lines):
    with open(".env", "w", encoding="ascii") as f:
        for k, v in lines:
            f.write(f"{k}={v}\n")

kid = (os.getenv("QOD_ACTIVE_SIGNING_KID") or "default").strip() or "default"
priv_b64u = (os.getenv("QOD_SIGNING_PRIVATE_KEY_B64URL") or "").strip()
pub_b64u  = (os.getenv("QOD_SIGNING_PUBLIC_KEY_B64URL") or "").strip()
pub_keys  = (os.getenv("QOD_PUBLIC_KEYS") or "").strip()

if priv_b64u and pub_b64u:
    print("Using Ed25519 keys from GitHub Secrets.")
    write_env([
        ("QOD_ACTIVE_SIGNING_KID", kid),
        ("QOD_SIGNING_PRIVATE_KEY_B64URL", priv_b64u),
        ("QOD_SIGNING_PUBLIC_KEY_B64URL", pub_b64u),
        ("QOD_PUBLIC_KEYS", pub_keys),
    ])
else:
    print("No Ed25519 secrets set; generating ephemeral CI keys.")
    from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PrivateKey

    def b64u(b: bytes) -> str:
        return base64.urlsafe_b64encode(b).decode("ascii").rstrip("=")

    priv = Ed25519PrivateKey.generate()
    pub = priv.public_key()

    write_env([
        ("QOD_ACTIVE_SIGNING_KID", "default"),
        ("QOD_SIGNING_PRIVATE_KEY_B64URL", b64u(priv.private_bytes_raw())),
        ("QOD_SIGNING_PUBLIC_KEY_B64URL", b64u(pub.public_bytes_raw())),
        ("QOD_PUBLIC_KEYS", ""),
    ])
PY

          echo "Generated .env (keys redacted):"
          sed \
            -e 's/QOD_SIGNING_PRIVATE_KEY_B64URL=.*/QOD_SIGNING_PRIVATE_KEY_B64URL=[redacted]/' \
            -e 's/QOD_SIGNING_PUBLIC_KEY_B64URL=.*/QOD_SIGNING_PUBLIC_KEY_B64URL=[redacted]/' \
            .env

      - name: Clean artifacts directory
        run: |
          rm -rf artifacts
          mkdir -p artifacts

      - name: Start services
        run: |
          docker compose up -d --build
          docker compose ps

      - name: Run tests
        run: |
          python -m unittest -v tests.test_integration_compose
          python -m unittest discover -s tests -p "test*.py" -v

      - name: List artifacts
        if: always()
        run: |
          echo "Artifacts directory listing:"
          ls -la artifacts || true
          echo ""
          echo "Artifacts files:"
          find artifacts -maxdepth 3 -type f -print || true

      - name: Compose logs (on failure)
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color --tail=200

      - name: Upload artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            artifacts/**
            *.log