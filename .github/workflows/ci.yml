name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Make runner tests and docker volume agree on where artifacts live
      QOD_ARTIFACTS_DIR: artifacts

      # Make sure EVERY step (including failure/debug) has the signing key
      QOD_SIGNING_KEY: ${{ secrets.QOD_SIGNING_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean artifacts folder (avoid stale picks)
        run: |
          rm -rf artifacts
          mkdir -p artifacts

      - name: Sanity check signing key present
        run: |
          test -n "$QOD_SIGNING_KEY"

      - name: Start services
        run: |
          docker compose up -d --build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Run tests
        run: |
          python -m unittest -v tests.test_integration_compose
          python -m unittest discover -s tests -p "test*.py" -v

      - name: List artifacts
        if: always()
        run: |
          echo "Artifacts directory listing:"
          ls -la artifacts || true
          echo ""
          echo "Artifacts files (maxdepth 3):"
          find artifacts -maxdepth 3 -type f -print || true

      - name: Compose logs (on failure)
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color --tail=200

      - name: Upload test artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            artifacts/**
            *.log