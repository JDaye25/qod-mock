name: smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start stack
        run: |
          docker compose up -d --build

      - name: Wait for container to be healthy
        run: |
          set -e
          for i in $(seq 1 60); do
            STATUS=$(docker inspect -f '{{.State.Health.Status}}' qod-api 2>/dev/null || echo starting)
            echo "health=$STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Service is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Container never became healthy"
          docker compose logs --no-color
          exit 1

      - name: Debug: docker status
        run: |
          docker compose ps
          docker compose logs --tail 120 --no-color

      - name: Debug: hit /ready on host port 8010
        run: |
          curl -v http://127.0.0.1:8010/ready

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Debug repo and tests
        run: |
          pwd
          ls -la
          echo "---- tests dir ----"
          ls -la tests || true
          echo "---- find test files ----"
          find . -maxdepth 3 -type f -name "test*.py" -print

      - name: Run tests
        env:
          BASE_URL: http://127.0.0.1:8010
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v

      - name: Logs on failure
        if: failure()
        run: |
          docker compose logs --no-color

      - name: Tear down
        if: always()
        run: |
          docker compose down -v